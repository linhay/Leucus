name: Release Assets To Pages

'on':
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to sync (empty = latest)
        required: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            release_id="$(jq -r '.release.id' "${GITHUB_EVENT_PATH}")"
            release_tag="$(jq -r '.release.tag_name' "${GITHUB_EVENT_PATH}")"
          else
            if [[ -n "${REQUESTED_TAG:-}" ]]; then
              endpoint="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${REQUESTED_TAG}"
            else
              endpoint="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/latest"
            fi
            release_json="$(
              curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${endpoint}"
            )"
            release_id="$(jq -r '.id' <<< "${release_json}")"
            release_tag="$(jq -r '.tag_name' <<< "${release_json}")"
          fi

          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Download appcast and zip assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          set -euo pipefail
          mkdir -p release-assets

          assets_api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?per_page=100"
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${assets_api}" \
            -o release-assets/assets.json

          jq -r '.[] | [.name, .url] | @tsv' release-assets/assets.json | while IFS=$'\t' read -r asset_name asset_api_url; do
            case "${asset_name}" in
              appcast.xml|*.zip)
                curl -fsSL \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/octet-stream" \
                  "${asset_api_url}" \
                  -o "release-assets/${asset_name}"
                ;;
            esac
          done

          test -f release-assets/appcast.xml

      - name: Publish to gh-pages
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch origin gh-pages:gh-pages
          git worktree add gh-pages-worktree gh-pages

          mkdir -p gh-pages-worktree/releases
          cp release-assets/appcast.xml gh-pages-worktree/appcast.xml
          if compgen -G "release-assets/*.zip" > /dev/null; then
            cp release-assets/*.zip gh-pages-worktree/releases/
          fi

          if [[ ! -f gh-pages-worktree/index.html ]]; then
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '<head>' \
              '  <meta charset="utf-8" />' \
              '  <meta name="viewport" content="width=device-width, initial-scale=1" />' \
              '  <title>Leucus Releases</title>' \
              '</head>' \
              '<body>' \
              '  <h1>Leucus Releases</h1>' \
              '  <p>Sparkle appcast: <a href="/Leucus/appcast.xml">appcast.xml</a></p>' \
              '  <p>Release packages are under <code>/Leucus/releases/</code>.</p>' \
              '</body>' \
              '</html>' \
              > gh-pages-worktree/index.html
          fi

          if [[ ! -f gh-pages-worktree/releases/.gitkeep ]]; then
            touch gh-pages-worktree/releases/.gitkeep
          fi

          cd gh-pages-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml releases index.html

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore(release): sync ${RELEASE_TAG} assets to gh-pages"
          git push origin HEAD:gh-pages

      - name: Cleanup
        if: always()
        run: |
          git worktree remove gh-pages-worktree --force || true
